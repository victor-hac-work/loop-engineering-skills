<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="loop-engineer — Stop prompting. Design the loop.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="0.55" stop-color="#0e1422"/>
      <stop offset="1" stop-color="#131a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c9cff"/>
      <stop offset="1" stop-color="#56e1c4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#56e1c4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#56e1c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#243049" stroke-width="1" opacity="0.35">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M320 0 V640 M640 0 V640 M960 0 V640"/>
  </g>

  <!-- glow behind loop motif -->
  <circle cx="1015" cy="320" r="230" fill="url(#glow)"/>

  <!-- loop motif: two arcs forming a cycle -->
  <g transform="translate(1015 320)" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round">
    <path d="M -120 0 A 120 120 0 1 1 0 120" opacity="0.95"/>
    <path d="M 120 0 A 120 120 0 1 1 0 -120" opacity="0.95"/>
    <!-- arrowheads -->
    <path d="M 0 120 l -26 -14 M 0 120 l 14 -26" stroke-width="16"/>
    <path d="M 0 -120 l 26 14 M 0 -120 l -14 26" stroke-width="16"/>
  </g>
  <!-- inner dotted core -->
  <g transform="translate(1015 320)" fill="none" stroke="#7c9cff" stroke-width="4" stroke-dasharray="3 14" stroke-linecap="round" opacity="0.7">
    <circle r="58"/>
  </g>

  <!-- wordmark -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
    <text x="96" y="250" font-size="92" font-weight="700" fill="#f5f7fb">loop-<tspan fill="url(#accent)">engineer</tspan></text>
  </g>

  <g font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <text x="100" y="330" font-size="40" font-weight="600" fill="#c7d2e8">Stop prompting. Design the loop.</text>
    <text x="100" y="392" font-size="25" fill="#8a99b8">A Claude Code skill for production-grade, memory-backed agent loops.</text>

    <!-- feature chips -->
    <g font-size="20" fill="#aeb9d4">
      <rect x="100" y="436" rx="16" ry="16" width="232" height="44" fill="#172033" stroke="#2b3a59"/>
      <text x="124" y="464">classify · det / non-det</text>
      <rect x="348" y="436" rx="16" ry="16" width="206" height="44" fill="#172033" stroke="#2b3a59"/>
      <text x="372" y="464">derive durable state</text>
      <rect x="570" y="436" rx="16" ry="16" width="220" height="44" fill="#172033" stroke="#2b3a59"/>
      <text x="594" y="464">guardrails + gates</text>
    </g>

    <text x="100" y="556" font-size="22" fill="#6f7ea0">“I don’t prompt Claude anymore. My job is to write loops.” — Boris Cherny, Claude Code</text>
  </g>
</svg>
