name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    name: Lint scripts & smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin & marketplace manifests
        run: |
          python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); assert m['name'] and m['plugins'], m; print('marketplace.json ok')"
          python3 -c "import json; p=json.load(open('.claude-plugin/plugin.json')); assert p['name']=='loop-engineering', p; print('plugin.json ok')"

      - name: Bash syntax check
        run: bash -n skills/loop-engineering/scripts/*.sh

      - name: ShellCheck
        run: shellcheck skills/loop-engineering/scripts/*.sh

      - name: scan-harness emits valid JSON
        run: |
          ./skills/loop-engineering/scripts/scan-harness.sh --project-dir . > /tmp/scan.json
          python3 -c "import json; d=json.load(open('/tmp/scan.json')); assert all(k in d for k in ('skills','agents','mcp','hooks','gitWorktreeCapable')), d; print('scan keys ok')"

      - name: init-memory scaffolds and is idempotent
        run: |
          ./skills/loop-engineering/scripts/init-memory.sh --topic ci-smoke --project-dir /tmp/leci > /tmp/m1.json
          test -f /tmp/leci/docs/loops-engineering/memory/ci-smoke/run-log.md
          test -f /tmp/leci/docs/loops-engineering/memory/ci-smoke/budget.md
          python3 -c "import json; json.load(open('/tmp/m1.json'))"
          # second run must not error (empty created array path)
          ./skills/loop-engineering/scripts/init-memory.sh --topic ci-smoke --project-dir /tmp/leci > /tmp/m2.json
          python3 -c "import json; d=json.load(open('/tmp/m2.json')); assert d['created']==[], d"
          echo "init-memory ok"
